name: Release Version Bump

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip 'v' prefix if present
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Validate semver
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '$VERSION' is not valid semver (expected MAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Bump version in JSON files
        run: bash scripts/bump-version.sh "${{ steps.version.outputs.version }}"

      - name: Regenerate platform outputs
        run: python3 generator/generate.py --all

      - name: Regenerate checksums
        run: |
          shasum -a 256 \
            skills/specops/SKILL.md \
            schema.json \
            platforms/claude/SKILL.md \
            platforms/claude/platform.json \
            platforms/cursor/specops.mdc \
            platforms/cursor/platform.json \
            platforms/codex/SKILL.md \
            platforms/codex/platform.json \
            platforms/copilot/specops.instructions.md \
            platforms/copilot/platform.json \
            core/workflow.md \
            core/safety.md \
            hooks/pre-commit \
            hooks/pre-push \
            scripts/install-hooks.sh \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            > CHECKSUMS.sha256

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            skills/ \
            platforms/claude/SKILL.md \
            platforms/claude/platform.json \
            platforms/cursor/specops.mdc \
            platforms/cursor/platform.json \
            platforms/codex/SKILL.md \
            platforms/codex/platform.json \
            platforms/copilot/specops.instructions.md \
            platforms/copilot/platform.json \
            .claude-plugin/ \
            CHECKSUMS.sha256
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main
