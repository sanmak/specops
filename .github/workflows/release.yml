name: Release Version Bump

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip 'v' prefix if present
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Validate semver
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: '$VERSION' is not valid semver (expected MAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Bump version in JSON files
        run: bash scripts/bump-version.sh "${{ steps.version.outputs.version }}"

      - name: Regenerate platform outputs
        run: python3 generator/generate.py --all

      - name: Regenerate checksums
        run: |
          shasum -a 256 \
            skills/specops/SKILL.md \
            schema.json \
            platforms/claude/SKILL.md \
            platforms/claude/platform.json \
            platforms/cursor/specops.mdc \
            platforms/cursor/platform.json \
            platforms/codex/SKILL.md \
            platforms/codex/platform.json \
            platforms/copilot/specops.instructions.md \
            platforms/copilot/platform.json \
            core/workflow.md \
            core/safety.md \
            hooks/pre-commit \
            hooks/pre-push \
            scripts/install-hooks.sh \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            > CHECKSUMS.sha256

      - name: Commit and push
        id: commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B force-creates the branch, resetting it if it already exists (safe for CI retries)
          git checkout -B "$BRANCH"
          git add \
            skills/ \
            platforms/claude/SKILL.md \
            platforms/claude/platform.json \
            platforms/cursor/specops.mdc \
            platforms/cursor/platform.json \
            platforms/codex/SKILL.md \
            platforms/codex/platform.json \
            platforms/copilot/specops.instructions.md \
            platforms/copilot/platform.json \
            .claude-plugin/ \
            CHECKSUMS.sha256
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${VERSION}"
            git push origin "$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump version to ${VERSION}" \
            --body "Automated version bump to ${VERSION} triggered by release tag \`v${VERSION}\`."
